name: Documentation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SSE_GIT_REVISION: ${{ github.sha }}

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo artifacts
        uses: swatinem/rust-cache@v2

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.5.4

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: pages
        uses: actions/configure-pages@v6

      - name: Test guide code examples
        run: mdbook test

      - name: Build physics guide
        run: mdbook build

      - name: Build Rust API documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --locked

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.126

      - name: Build browser demo module
        run: |
          cargo build -p sse-web --target wasm32-unknown-unknown --release --locked
          wasm-bindgen --target web --no-typescript \
            --out-dir sse-web/web/pkg \
            target/wasm32-unknown-unknown/release/sse_web.wasm

      - name: Verify wasm chain parity against the CLI fixture
        run: node sse-web/tests/wasm_parity.mjs

      - name: Verify browser statistics against the CLI summary
        run: node sse-web/tests/stats_parity.mjs

      - name: Assemble documentation site
        run: |
          mkdir -p target/site/api target/site/demo
          cp -R target/book/. target/site/
          cp -R target/doc/. target/site/api/
          cp -R sse-web/web/. target/site/demo/

      - name: Upload pull-request preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: documentation-site
          path: target/site
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/site

  deploy:
    name: Deploy GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v5
