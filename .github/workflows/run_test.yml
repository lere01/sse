name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SSE_GIT_REVISION: ${{ github.sha }}

jobs:
  quality:
    name: Format, lint, test, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run all target tests
        run: cargo test --all-targets --locked

      - name: Run documentation tests
        run: cargo test --doc --locked

      - name: Build warning-free API documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --locked

      - name: Verify the release package
        run: cargo package --locked

  minimum-rust:
    name: Minimum supported Rust 1.80
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust 1.80
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.80"

      - name: Cache Cargo artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: msrv-1.80

      - name: Check minimum supported Rust
        run: cargo check --all-targets --locked
