name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SSE_GIT_REVISION: ${{ github.sha }}

jobs:
  verify:
    name: Verify release tag and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test "${GITHUB_REF_NAME}" = "v${cargo_version}"

      - name: Run release tests
        run: cargo test --all-targets --locked

      - name: Verify crate package
        run: cargo package --locked

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar
          - runner: macos-15
            target: aarch64-apple-darwin
            archive: tar
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust target
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          archive="sse-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "${archive}" sse
          shasum -a 256 "${archive}" > "${archive}.sha256"

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "sse-${env:GITHUB_REF_NAME}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/sse.exe" -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Set-Content -Encoding ascii "$archive.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: sse-${{ matrix.target }}
          path: |
            sse-*.tar.gz
            sse-*.zip
            sse-*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish immutable tagged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes
